name: Maintenance

on:
  schedule:
    # 18:00 ET = 22:00 UTC (summer/EDT). Also run 23:00 UTC to cover winter/EST.
    - cron: '0 22 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch: {}

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run maintenance
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/run_maintenance.py
