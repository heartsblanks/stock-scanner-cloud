steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/stock-scanner:$COMMIT_SHA'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/stock-scanner:$COMMIT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'stock-scanner'
      - '--image'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/stock-scanner:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--concurrency'
      - '1'
      - '--max-instances'
      - '2'
      - '--vpc-connector'
      - 'ibkr-bridge-connector'
      - '--vpc-egress'
      - 'private-ranges-only'
      - '--set-env-vars'
      - 'DB_SCHEMA=public,GITHUB_REPO=stock-scanner-trade-logs,GITHUB_OWNER=$_GITHUB_OWNER,GITHUB_BRANCH=main,ENABLE_DB_LOGGING=true,PAPER_BROKER=ibkr,PAPER_MODE_PLACEMENT_CONFIDENCE_FLOORS=low_price:88,PAPER_LOW_PRICE_MODE_MIN_PRICE=1,PAPER_LOW_PRICE_MODE_MAX_PRICE=35,PAPER_LOW_PRICE_MODE_MIN_RELATIVE_VOLUME=1.2,PAPER_LOW_PRICE_MODE_MIN_GROSS_TARGET_PROFIT_DOLLARS=8,PAPER_LOW_PRICE_MODE_MIN_NET_TARGET_PROFIT_DOLLARS=4.5,PAPER_LOW_PRICE_MODE_MIN_NET_REWARD_RISK=1.25,PAPER_LOW_PRICE_MODE_NOTIONAL_TIERS=1:2:300;2:5:500;5:35:1000,PAPER_BREAKOUT_CLOSE_BUFFER_PCT=0.001,PAPER_NEAR_BREAKOUT_WATCH_PCT=0.004,PAPER_SYMBOL_TREND_LOOKBACK_CANDLES=5,PAPER_SYMBOL_TREND_HARD_GATE=false,PAPER_LOW_PRICE_MIN_3_CANDLE_REL_VOLUME=1.1,PAPER_RELATIVE_STRENGTH_LOOKBACK_CANDLES=10,PAPER_RELATIVE_STRENGTH_MIN_EDGE_PCT=0.001,PAPER_FAILED_BREAKOUT_COOLDOWN_MINUTES=90,PAPER_LOW_PRICE_LATE_STRICT_AFTER_NY=14:30,PAPER_LOW_PRICE_BLOCK_AFTER_NY=15:30,PAPER_LOW_PRICE_LATE_MIN_CONFIDENCE=92,PAPER_LOW_PRICE_LATE_MIN_RELATIVE_VOLUME=1.3,PAPER_LOW_PRICE_LATE_MIN_NET_REWARD_RISK=1.35,PAPER_LOW_PRICE_MAX_SPREAD_PCT=0.006,PAPER_MIN_RELATIVE_VOLUME=1.2,PAPER_CORE_MIN_RELATIVE_VOLUME=1.05,PAPER_SCAN_MARKET_DATA_TIME_BUDGET_SECONDS=24,SYMBOL_ELIGIBILITY_MAX_SYMBOLS_PER_MODE=0,SCHEDULED_PAPER_ACCOUNT_SIZE=2000,PAPER_ACCOUNT_HARD_CAP=2000,IBKR_SHADOW_ACCOUNT_SIZE_FALLBACK=2000,PAPER_MAX_NOTIONAL=1000,SYMBOL_ELIGIBILITY_MAX_NOTIONAL=1000,PAPER_MIN_GROSS_TARGET_PROFIT_DOLLARS=8,PAPER_MIN_NET_TARGET_PROFIT_DOLLARS=4.5,PAPER_MIN_NET_REWARD_RISK=1.25,PAPER_PREFERRED_SYMBOL_MIN_PRIORITY_BY_MODE=low_price:0,PAPER_LOW_PRICE_ALERT_ONLY_BELOW=0,PAPER_TRADE_MAX_CAPITAL_ALLOCATION_PCT=1.0,PAPER_TRADE_ENFORCE_MAX_POSITIONS=true,PAPER_TRADE_MAX_POSITIONS=2,ENABLE_IBKR_SHADOW_MODE=false,IBKR_BRIDGE_BASE_URL=http://10.128.0.3:8090,IBKR_VM_ZONE=us-central1-a,IBKR_VM_INSTANCE_NAME=ibkr-bridge-vm-us,TELEGRAM_CHAT_ID=5018353346,TELEGRAM_ALERT_DEDUP_MINUTES=30,IBKR_LOW_CALL_MODE=true,IBKR_LOGIN_ALERT_CHECK_INTERVAL_MINUTES=30,IBKR_ACCOUNT_EQUITY_CACHE_TTL_SECONDS=1800,IBKR_SYNC_BATCH_TIME_BUDGET_SECONDS=210,IBKR_BRIDGE_ORDER_SYNC_TIMEOUT_SECONDS=8,IBKR_BRIDGE_ORDER_SYNC_BATCH_TIMEOUT_SECONDS=60,IBKR_EOD_CLOSE_POLL_ATTEMPTS=2,IBKR_EOD_CLOSE_POLL_INTERVAL_SECONDS=5,AUTO_IBKR_REPAIR_AFTER_SYNC=true,AUTO_IBKR_REPAIR_AFTER_PARTIAL_SYNC=true,IBKR_BRIDGE_ACCOUNT_TIMEOUT_SECONDS=20,IBKR_BRIDGE_OPEN_STATE_TIMEOUT_SECONDS=20,IBKR_SYNC_MAX_PER_RUN=10,IBKR_SYNC_TIMEOUT_CIRCUIT_THRESHOLD=3,IBKR_SYNC_TIMEOUT_CIRCUIT_COOLDOWN_SECONDS=30'
      - '--update-secrets'
      - 'DATABASE_URL=database-url:latest,GITHUB_TOKEN=github-token:latest,IBKR_BRIDGE_TOKEN=ibkr-bridge-token:latest,TELEGRAM_BOT_TOKEN=telegram-bot-token:latest,ADMIN_API_TOKEN=admin-api-token:latest'
images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/stock-scanner:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
