steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/stock-scanner:$COMMIT_SHA'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/stock-scanner:$COMMIT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'stock-scanner'
      - '--image'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/stock-scanner:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--concurrency'
      - '10'
      - '--max-instances'
      - '1'
      - '--set-env-vars'
      - 'APCA_BASE_URL=https://paper-api.alpaca.markets,ALPACA_MAX_NOTIONAL=10000,DB_SCHEMA=public,GITHUB_REPO=alpaca-trade-logs,GITHUB_OWNER=$_GITHUB_OWNER,GITHUB_BRANCH=main,ENABLE_DB_LOGGING=true,ENABLE_ALPACA_HTTP_AUDIT=true,PAPER_TRADE_MAX_CAPITAL_ALLOCATION_PCT=1.0,PAPER_TRADE_ENFORCE_MAX_POSITIONS=false,PAPER_TRADE_MAX_POSITIONS=10'
      - '--update-secrets'
      - 'TWELVEDATA_API_KEY=twelvedata-api-key:latest,APCA_API_KEY_ID=alpaca-api-key-id:latest,APCA_API_SECRET_KEY=alpaca-api-secret-key:latest,DATABASE_URL=database-url:latest,GITHUB_TOKEN=github-token:latest'
images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/stock-scanner:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
