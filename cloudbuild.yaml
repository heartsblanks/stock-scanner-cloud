steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/stock-scanner:$COMMIT_SHA'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/stock-scanner:$COMMIT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'stock-scanner'
      - '--image'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/stock-scanner:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--concurrency'
      - '1'
      - '--max-instances'
      - '1'
      - '--vpc-connector'
      - 'ibkr-bridge-connector'
      - '--vpc-egress'
      - 'private-ranges-only'
      - '--set-env-vars'
      - 'DB_SCHEMA=public,GITHUB_REPO=stock-scanner-trade-logs,GITHUB_OWNER=$_GITHUB_OWNER,GITHUB_BRANCH=main,ENABLE_DB_LOGGING=true,PAPER_BROKER=ibkr,PAPER_TRADE_MAX_CAPITAL_ALLOCATION_PCT=1.0,PAPER_TRADE_ENFORCE_MAX_POSITIONS=false,PAPER_TRADE_MAX_POSITIONS=10,ENABLE_IBKR_SHADOW_MODE=false,IBKR_BRIDGE_BASE_URL=http://10.132.0.2:8090,TELEGRAM_CHAT_ID=5018353346,TELEGRAM_ALERT_DEDUP_MINUTES=30,IBKR_SYNC_BATCH_TIME_BUDGET_SECONDS=210,IBKR_BRIDGE_ORDER_SYNC_TIMEOUT_SECONDS=8,IBKR_EOD_CLOSE_POLL_ATTEMPTS=8,IBKR_EOD_CLOSE_POLL_INTERVAL_SECONDS=2,AUTO_IBKR_REPAIR_AFTER_PARTIAL_SYNC=true,IBKR_BRIDGE_ACCOUNT_TIMEOUT_SECONDS=20,IBKR_BRIDGE_OPEN_STATE_TIMEOUT_SECONDS=20,IBKR_SYNC_MAX_PER_RUN=8,IBKR_SYNC_TIMEOUT_CIRCUIT_THRESHOLD=3,IBKR_SYNC_TIMEOUT_CIRCUIT_COOLDOWN_SECONDS=30'
      - '--update-secrets'
      - 'TWELVEDATA_API_KEY=twelvedata-api-key:latest,DATABASE_URL=database-url:latest,GITHUB_TOKEN=github-token:latest,IBKR_BRIDGE_TOKEN=ibkr-bridge-token:latest,TELEGRAM_BOT_TOKEN=telegram-bot-token:latest,ADMIN_API_TOKEN=admin-api-token:latest'
images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/stock-scanner:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
